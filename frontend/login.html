<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ingresa tus credenciales para administrar los productos de Moobilia."
    />
    <title>Ingreso administrativo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/estilos.css" />
  </head>

  <body>
    <!-- Barra de navegacion principal -->
    <nav class="navbar navbar-expand-lg navbar-moobilia">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Moobilia</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#menuPrincipal"
          aria-controls="menuPrincipal"
          aria-expanded="false"
          aria-label="Abrir menu de navegacion"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuPrincipal">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="productos.html">Productos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="ayuda.html">Ayuda</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contacto.html">Contacto</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="login.html"
                >Login</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="admin-productos.html"
                >Administrar productos</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main>
      <!-- Orientacion para el usuario administrador -->
      <section class="py-5 text-center bg-light">
        <div class="container">
          <h1 class="fw-bold">Ingreso administrativo</h1>
          <p class="lead mb-0">
            Ingresa con tu correo y contrase&ntilde;a para administrar la tienda
            online.
          </p>
        </div>
      </section>

      <section class="py-5">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
              <div class="card">
                <div class="card-body">
                  <h2 class="h4 mb-4 text-center">Datos de acceso</h2>

                  <form id="formLogin">
                    <div class="mb-3">
                      <label for="correo" class="form-label"
                        >Correo electr&oacute;nico</label
                      >
                      <input
                        type="email"
                        class="form-control"
                        id="correo"
                        name="correo"
                        placeholder="admin@tienda.com"
                        required
                      />
                    </div>

                    <div class="mb-3">
                      <label for="password" class="form-label"
                        >Contrase&ntilde;a</label
                      >
                      <input
                        type="password"
                        class="form-control"
                        id="password"
                        name="password"
                        placeholder="Escribe tu contrasena"
                        required
                      />
                    </div>

                    <button type="submit" class="btn btn-moobilia w-100">
                      Ingresar
                    </button>
                  </form>

                  <div id="mensajeLogin" class="alert d-none mt-3" role="alert">
                    Mensaje de respuesta
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Pie de pagina basico -->
    <footer class="footer-moobilia text-center py-3">
      <div class="container">
        <p class="mb-0">
          &copy; 2026 Mi Tienda Online. Todos los derechos reservados.
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
